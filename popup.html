<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Palette borrowed from whatiiif (prod/index.html :root vars) */
  :root{
    --ink:#1a1814; --ink-mid:#4a4540; --ink-faint:#8a8480;
    --accent:#7a3b1e; --accent-light:#c4886a; --accent-bg:#f5ede8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    width:380px; font:13px/1.5 system-ui,Segoe UI,sans-serif;
    color:var(--ink); background:var(--accent-bg);
  }
  header{
    display:flex; align-items:baseline; gap:.5rem;
    padding:.7rem .9rem .5rem; border-bottom:1px solid var(--accent-light);
  }
  header h1{font-size:1rem; color:var(--accent); letter-spacing:.02em}
  header .logo{align-self:center; width:16px; height:16px}
  header .count{font-size:.78rem; color:var(--ink-mid)}
  header .credit{
    margin-left:auto; font-size:.62rem; font-style:italic;
    color:var(--ink-faint); letter-spacing:.03em; white-space:nowrap;
    text-decoration:none;
  }
  header .credit:hover{color:var(--accent); text-decoration:underline}
  #list{max-height:340px; overflow-y:auto}
  .item{
    padding:.55rem .9rem; border-bottom:1px solid #e7dcd4;
    background:#fbf7f4;
  }
  .item.confirmed{background:#f2e9e2}
  .item .row1{display:flex; align-items:center; gap:.45rem; margin-bottom:.3rem}
  .chip{
    font-size:.62rem; text-transform:uppercase; letter-spacing:.05em;
    padding:.08rem .4rem; border-radius:8px; white-space:nowrap;
  }
  .chip.confirmed{background:var(--accent); color:#fff}
  .chip.likely{background:var(--accent-light); color:#fff}
  .chip.candidate{background:#ddd3cb; color:var(--ink-mid)}
  .chip.platform{background:var(--ink-mid); color:#fff}
  .src{font-size:.68rem; color:var(--ink-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .url{
    font-family:Consolas,monospace; font-size:.72rem; color:var(--ink-mid);
    word-break:break-all; margin-bottom:.35rem; max-height:2.6em; overflow:hidden;
  }
  .checked .url{color:var(--ink-faint); text-decoration:line-through}
  .btns{display:flex; gap:.4rem; flex-wrap:wrap}
  button{
    font:600 .72rem system-ui,Segoe UI,sans-serif; cursor:pointer;
    padding:.28rem .6rem; border-radius:3px; border:1px solid var(--accent);
    background:#fff; color:var(--accent);
  }
  button:hover{background:var(--accent); color:#fff}
  button.primary{background:var(--accent); color:#fff}
  button.primary:hover{background:#5e2d16}
  button:disabled{opacity:.5; cursor:default}
  #empty{padding:1.1rem .9rem; color:var(--ink-mid); font-size:.8rem}
  footer{padding:.6rem .9rem; display:flex; align-items:center; gap:.6rem}
  #status{font-size:.7rem; color:var(--ink-faint); flex:1}
</style>
</head>
<body>
  <header>
    <img class="logo" src="icons/icon32.png" alt="" width="16" height="16">
    <h1>Sniiiffer</h1>
    <span class="count" id="count"></span>
    <a class="credit" href="https://whatiiif.com/contact.html" target="_blank" rel="noopener">Built by Nate Moore</a>
  </header>
  <div id="list"></div>
  <div id="empty" hidden>No IIIF manifest detected on this page.</div>
  <footer>
    <span id="status"></span>
    <button id="settings" title="Settings — choose what a single click on the icon does">⚙</button>
    <button id="deepScan" class="primary">Deep scan</button>
  </footer>
  <script src="common/detect.js"></script>
  <script src="common/actions.js"></script>
  <script src="popup.js"></script>
</body>
</html>
